<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page not found</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560&family=Karla:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0E1B33; --ink-2:#08101F; --gold:#D7A33A; --paper:#FBF8F1; --line:#E3DACA; --muted:rgba(14,27,51,.65); }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:grid; place-items:center; padding:2rem;
    font-family:"Karla",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink);
    background:radial-gradient(120% 120% at 80% -10%, #16284A 0%, var(--ink) 55%, var(--ink-2) 100%); }
  .card{ background:var(--paper); border:1px solid var(--line); border-radius:18px;
    max-width:520px; width:100%; padding:3rem 2.4rem; text-align:center;
    box-shadow:0 30px 80px -30px rgba(8,16,31,.7); }
  svg{ width:52px; height:52px; }
  .code{ font-family:"Fraunces",Georgia,serif; font-size:clamp(4rem,14vw,7rem); line-height:1; color:var(--gold); margin:.6rem 0 .2rem; }
  h1{ font-family:"Fraunces",Georgia,serif; font-weight:560; font-size:1.5rem; margin:.2rem 0 .6rem; }
  p{ color:var(--muted); line-height:1.65; margin:0 auto 1.6rem; max-width:38ch; }
  a.btn{ display:inline-block; background:var(--gold); color:var(--ink-2); text-decoration:none;
    font-weight:700; padding:.7rem 1.5rem; border-radius:999px; }
  a.btn:hover{ filter:brightness(1.05); }
</style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="24" cy="24" r="22" stroke="#D7A33A" stroke-width="2"/>
      <path d="M24 34V20" stroke="#0E1B33" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M24 22c0-4 3-7 8-7 0 4-3 7-8 7Z" fill="#D7A33A"/>
      <path d="M24 26c0-4-3-7-8-7 0 4 3 7 8 7Z" fill="#0E1B33"/>
      <circle cx="24" cy="35" r="2.4" fill="#D7A33A"/>
    </svg>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for has moved, or never existed. Let’s get you back on the path.</p>
    <a class="btn" href="/">Back to home</a>
  </div>
</body>
</html>
